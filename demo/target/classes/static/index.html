<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsun Market - UX Optimized Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f6f9;
            color: #1e293b;
            -webkit-font-smoothing: antialiased;
        }
        .navbar-custom {
            background: #0f172a;
            border-bottom: 1px solid #334155;
        }
        .card {
            border: none;
            border-radius: 16px;
            background: #ffffff;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
        }
        .form-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }
        .btn-action {
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            transition: all 0.2s;
        }
        .btn-action-delete:hover {
            background-color: #fee2e2 !important;
            color: #ef4444 !important;
        }
        .table th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            background-color: #f8fafc !important;
            color: #64748b;
            padding: 16px;
            border-bottom: 1px solid #e2e8f0;
        }
        .table td {
            padding: 16px;
            vertical-align: middle;
            border-bottom: 1px solid #f1f5f9;
        }
        .badge-price {
            background-color: #f0fdf4;
            color: #166534;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 8px;
            display: inline-block;
        }
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1060;
        }
        /* Empty State UX Grafiği */
        .empty-state {
            padding: 40px;
            text-align: center;
            color: #94a3b8;
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            color: #cbd5e1;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark navbar-custom py-3 mb-5">
        <div class="container">
            <span class="navbar-brand fw-bold d-flex align-items-center">
                <i class="fa-solid fa-store text-primary me-2"></i> Samsun Market Admin
            </span>
            <span class="badge bg-dark border border-secondary text-secondary">Sistem Çevrimiçi</span>
        </div>
    </nav>

    <div class="container">
        <div class="toast-container" id="toastContainer"></div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card p-4">
                    <h5 class="fw-bold mb-3 text-dark">Ürün Girişi</h5>
                    <p class="text-muted small mb-4">Sisteme yeni ürün eklemek için aşağıdaki alanları eksiksiz doldurun.</p>
                    
                    <form id="productForm">
                        <div class="mb-3">
                            <label for="productName" class="form-label fw-semibold text-secondary small">Ürün Adı</label>
                            <input type="text" id="productName" class="form-control form-control-lg fs-6" placeholder="Örn: Akıllı Saat" autocomplete="off" required>
                        </div>
                        <div class="mb-4">
                            <label for="productPrice" class="form-label fw-semibold text-secondary small">Fiyat (TL)</label>
                            <div class="input-group input-group-lg">
                                <input type="number" id="productPrice" class="form-control fs-6" placeholder="0.00" step="0.01" min="0.01" required>
                                <span class="input-group-text bg-light text-muted fs-6">TL</span>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 fs-6 fw-medium">
                            <i class="fa-solid fa-plus me-2"></i> Stoğa Ekle
                        </button>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card overflow-hidden">
                    <div class="px-4 py-3 bg-white border-bottom d-flex justify-content-between align-items-center">
                        <h5 class="fw-bold m-0 text-dark">Ürün Envanteri</h5>
                        <span class="badge bg-light text-dark border fw-semibold rounded-pill px-3 py-2" id="productCounter">0 Aktif Ürün</span>
                    </div>
                    
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th>KOD (ID)</th>
                                    <th>ÜRÜN TANIMI</th>
                                    <th>BİRİM FİYAT</th>
                                    <th class="text-end">İŞLEMLER</th>
                                </tr>
                            </thead>
                            <tbody id="productTableBody">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="card w-100">
                <div class="card-body p-4 text-center">
                    <i class="fa-solid fa-circle-exclamation text-danger mb-3" style="font-size: 2.5rem;"></i>
                    <h5 class="fw-bold mb-2">Emin misiniz?</h5>
                    <p class="text-muted small mb-4"><strong id="modalProductName"></strong> ürünü kalıcı olarak silinecektir.</p>
                    <div class="d-flex gap-2 justify-content-center">
                        <button type="button" class="btn btn-light w-50" data-bs-dismiss="modal">İptal</button>
                        <button type="button" id="confirmDeleteBtn" class="btn btn-danger w-50">Evet, Sil</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiUrl = 'http://localhost:8080/api/products';
        let deleteModal;
        let selectedProductId = null;

        document.addEventListener("DOMContentLoaded", () => {
            deleteModal = new bootstrap.Modal(document.getElementById('deleteConfirmModal'));
            getProducts();
        });

        // 1. GET - Verileri Listele
        function getProducts() {
            fetch(apiUrl)
                .then(response => response.json())
                .then(products => {
                    const tbody = document.getElementById('productTableBody');
                    document.getElementById('productCounter').innerText = `${products.length} Aktif Ürün`;
                    tbody.innerHTML = '';

                    if(products.length === 0) {
                        tbody.innerHTML = `
                            <tr>
                                <td colspan="4" class="p-0">
                                    <div class="empty-state">
                                        <i class="fa-solid fa-box-open"></i>
                                        <h6 class="fw-bold text-dark m-0">Envanter Boş</h6>
                                        <p class="small text-muted m-0 mt-1">Henüz hiçbir ürün tanımlanmamış.</p>
                                    </div>
                                </td>
                            </tr>`;
                        return;
                    }

                    products.forEach(product => {
                        tbody.innerHTML += `
                            <tr>
                                <td class="text-muted fw-mono small">#${product.id}</td>
                                <td class="fw-semibold text-dark">${product.name}</td>
                                <td><span class="badge-price">${product.price.toLocaleString('tr-TR', { minimumFractionDigits: 2 })} TL</span></td>
                                <td class="text-end">
                                    <button class="btn btn-action btn-light btn-action-delete" onclick="triggerDeleteModal(${product.id}, '${product.name}')" title="Ürünü Sil">
                                        <i class="fa-solid fa-trash small"></i>
                                    </button>
                                </td>
                            </tr>
                        `;
                    });
                })
                .catch(() => showToast('Veritabanı bağlantı hatası!', 'danger'));
        }

        // 2. POST - Ürün Ekle
        document.getElementById('productForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const nameInput = document.getElementById('productName');
            const priceInput = document.getElementById('productPrice');

            const newProduct = { name: nameInput.value, price: parseFloat(priceInput.value) };

            fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newProduct)
            })
            .then(response => {
                if(response.ok) {
                    showToast(`${nameInput.value} envantere başarıyla eklendi.`, 'success');
                    document.getElementById('productForm').reset();
                    getProducts();
                    nameInput.focus(); // Form sıfırlandıktan sonra odak yine isme döner (UX Akışı)
                } else {
                    showToast('Hatalı veri girişi! Lütfen alanları kontrol edin.', 'warning');
                }
            })
            .catch(() => showToast('Ekleme işlemi başarısız oldu.', 'danger'));
        });

        // 3. DELETE - Onay Tetikleyici (Modal Açıcı)
        function triggerDeleteModal(id, name) {
            selectedProductId = id;
            document.getElementById('modalProductName').innerText = name;
            deleteModal.show();
        }

        // Kesin Silme Butonu Olay Tetikleyicisi
        document.getElementById('confirmDeleteBtn').addEventListener('click', () => {
            if(selectedProductId) {
                fetch(`${apiUrl}/${selectedProductId}`, { method: 'DELETE' })
                .then(response => {
                    if(response.status === 204 || response.ok) {
                        deleteModal.hide();
                        getProducts();
                        showToast('Ürün stoktan kalıcı olarak kaldırıldı.', 'info');
                    } else {
                        showToast('Silme işlemi başarısız!', 'danger');
                    }
                })
                .catch(() => showToast('Bağlantı hatası sebebiyle silinemedi.', 'danger'));
            }
        });

        // Toast Bildirim Fonksiyonu
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toastId = 'toast_' + Date.now();
            let bgClass = 'bg-dark';
            if (type === 'success') bgClass = 'bg-success text-white';
            if (type === 'danger') bgClass = 'bg-danger text-white';
            if (type === 'warning') bgClass = 'bg-warning text-dark';
            if (type === 'info') bgClass = 'bg-primary text-white';

            const toastHtml = `
                <div id="${toastId}" class="toast align-items-center ${bgClass} border-0 shadow-lg" role="alert" aria-live="assertive" aria-atomic="true">
                    <div class="d-flex">
                        <div class="toast-body small fw-medium"><i class="fa-solid fa-info-circle me-2"></i> ${message}</div>
                        <button type="button" class="btn-close btn-close-white m-auto me-2" data-bs-dismiss="toast" aria-label="Close"></button>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', toastHtml);
            const toastElement = document.getElementById(toastId);
            const bsToast = new bootstrap.Toast(toastElement, { delay: 3500 });
            bsToast.show();
            toastElement.addEventListener('hidden.bs.toast', () => toastElement.remove());
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
