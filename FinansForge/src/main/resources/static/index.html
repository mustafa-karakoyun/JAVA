<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinansForge - Borsa Portföy Takip</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        cardBg: '#1e293b',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-darkBg text-slate-100 font-sans min-h-screen">

    <nav class="bg-cardBg border-b border-slate-700 px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-wider text-emerald-400">🔥 FINANSFORGE</h1>
        <div class="text-sm bg-slate-700 px-3 py-1 rounded-full text-slate-300">Kullanıcı ID: 1 (Mustafa)</div>
    </nav>

    <div class="p-6 max-w-7xl mx-auto space-y-6">

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-cardBg p-4 rounded-xl border border-slate-700 shadow-lg">
                <p class="text-xs text-slate-400 uppercase font-semibold">Portföy Değeri</p>
                <p id="totalValue" class="text-2xl font-bold mt-1 text-slate-100">0.00 TL</p>
            </div>
            <div class="bg-cardBg p-4 rounded-xl border border-slate-700 shadow-lg">
                <p class="text-xs text-slate-400 uppercase font-semibold">Toplam Maliyet</p>
                <p id="totalCost" class="text-2xl font-bold mt-1 text-slate-100">0.00 TL</p>
            </div>
            <div class="bg-cardBg p-4 rounded-xl border border-slate-700 shadow-lg">
                <p class="text-xs text-slate-400 uppercase font-semibold">Net Kâr / Zarar</p>
                <p id="netProfit" class="text-2xl font-bold mt-1 text-slate-100">0.00 TL</p>
            </div>
            <div class="bg-cardBg p-4 rounded-xl border border-slate-700 shadow-lg">
                <p class="text-xs text-slate-400 uppercase font-semibold">Toplam Başarı (%)</p>
                <p id="totalPercentage" class="text-2xl font-bold mt-1 text-slate-100">%0.00</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2 bg-cardBg p-5 rounded-xl border border-slate-700 shadow-lg space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-bold text-emerald-400">📈 Varlıklarım (Portföy)</h2>
                    <button onclick="openModal('add')" class="bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-semibold px-3 py-2 rounded-lg transition">
                        + Yeni İşlem Ekle
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm text-slate-300">
                        <thead class="text-xs uppercase bg-slate-800 text-slate-400 border-b border-slate-700">
                            <tr>
                                <th class="p-3">Hisse</th>
                                <th class="p-3">Şirket</th>
                                <th class="p-3">Adet</th>
                                <th class="p-3">Maliyet</th>
                                <th class="p-3">Anlık Fiyat</th>
                                <th class="p-3">Kâr/Zarar (%)</th>
                            </tr>
                        </thead>
                        <tbody id="portfolioTableBody">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="bg-cardBg p-5 rounded-xl border border-slate-700 shadow-lg space-y-4">
                <h2 class="text-lg font-bold text-sky-400">🔍 Takip Listem (Watchlist)</h2>
                <div class="flex gap-2">
                    <input type="text" id="watchlistTickerInput" placeholder="Örn: THYAO.IS" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-sky-500 flex-1 uppercase">
                    <button onclick="addStockToWatchlist()" class="bg-sky-500 hover:bg-sky-600 text-white text-xs font-semibold px-4 rounded-lg transition">Ekle</button>
                </div>
                <div id="watchlistContainer" class="space-y-2 max-h-64 overflow-y-auto">
                    </div>
            </div>

        </div>
    </div>

    <div id="transactionModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex justify-center items-center p-4">
        <div class="bg-cardBg border border-slate-700 rounded-xl p-6 w-full max-w-md space-y-4 shadow-2xl animate-fade-in">
            <h3 id="modalTitle" class="text-lg font-bold text-slate-100">Hisse İşlemi</h3>
            <form id="modalForm" onsubmit="handleFormSubmit(event)" class="space-y-3">
                <input type="hidden" id="modalType">
                <div>
                    <label class="block text-xs text-slate-400 mb-1 font-medium">Hisse Kodu (Ticker)</label>
                    <input type="text" id="formTicker" required placeholder="THYAO.IS" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none uppercase">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1 font-medium">Adet (Lot)</label>
                    <input type="number" id="formQuantity" required min="1" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none">
                </div>
                <div id="priceInputContainer">
                    <label class="block text-xs text-slate-400 mb-1 font-medium">İşlem Fiyatı</label>
                    <input type="number" step="0.01" id="formPrice" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none">
                </div>
                <div class="flex justify-end gap-2 pt-2">
                    <button type="button" onclick="closeModal()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-sm transition">İptal</button>
                    <button type="submit" class="bg-emerald-500 hover:bg-emerald-600 px-4 py-2 rounded-lg text-sm text-white font-semibold transition">Onayla</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:8080/api";
        const USER_ID = 1;

        // Sayfa açıldığında tüm verileri yükle
        window.onload = () => {
            refreshData();
        };

        function refreshData() {
            loadSummary();
            loadPortfolio();
            // Not: Watchlist mock ID 1 kabul edilmiştir, data.sql'den gelir.
            loadWatchlist(1); 
        }

        // 1. DASHBOARD VERİLERİNİ ÇEK
        async function loadSummary() {
            try {
                const res = await fetch(`${API_BASE}/portfolio/user/${USER_ID}/summary`);
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById("totalValue").innerText = data.totalPortfolioValue.toFixed(2) + " TL";
                    document.getElementById("totalCost").innerText = data.totalCost.toFixed(2) + " TL";
                    
                    const netProfitEl = document.getElementById("netProfit");
                    netProfitEl.innerText = data.netProfitLoss.toFixed(2) + " TL";
                    netProfitEl.className = `text-2xl font-bold mt-1 ${data.netProfitLoss >= 0 ? 'text-emerald-400' : 'text-red-400'}`;

                    const percentageEl = document.getElementById("totalPercentage");
                    percentageEl.innerText = "%" + data.totalProfitLossPercentage.toFixed(2);
                    percentageEl.className = `text-2xl font-bold mt-1 ${data.totalProfitLossPercentage >= 0 ? 'text-emerald-400' : 'text-red-400'}`;
                }
            } catch (err) { console.error("Summary çekilemedi:", err); }
        }

        // 2. PORTFÖY TABLOSUNU DOLDUR
        async function loadPortfolio() {
            try {
                const res = await fetch(`${API_BASE}/portfolio/user/${USER_ID}`);
                const tbody = document.getElementById("portfolioTableBody");
                tbody.innerHTML = "";
                
                if (res.ok) {
                    const assets = await res.json();
                    if(assets.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="6" class="p-4 text-center text-slate-500">Portföyünüz henüz boş.</td></tr>`;
                        return;
                    }
                    assets.forEach(asset => {
                        const isProfit = asset.profitLossPercentage >= 0;
                        tbody.innerHTML += `
                            <tr class="border-b border-slate-800 hover:bg-slate-800/50 transition">
                                <td class="p-3 font-bold text-emerald-400 uppercase">${asset.ticker}</td>
                                <td class="p-3 text-slate-400 text-xs">${asset.stockName}</td>
                                <td class="p-3">${asset.quantity}</td>
                                <td class="p-3">${asset.avgCost.toFixed(2)} TL</td>
                                <td class="p-3 font-semibold text-slate-100">${asset.currentPrice.toFixed(2)} TL</td>
                                <td class="p-3 font-bold ${isProfit ? 'text-emerald-400' : 'text-red-400'}">
                                    %${asset.profitLossPercentage.toFixed(2)}
                                </td>
                            </tr>
                        `;
                    });
                }
            } catch (err) { console.error("Portföy çekilemedi:", err); }
        }

        // 3. WATCHLIST DOLDUR (Mock olarak backend Watchlist yapısı listeleme API'si olmadığı için doğrudan her eklemede dönen şablon üzerinden yönetilebilir, veya eklendikçe tetiklenir)
        // Not: Basitlik adına watchlist akışı eklendiğinde/silindiğinde backend tetiklenir.
        async function addStockToWatchlist() {
            const input = document.getElementById("watchlistTickerInput");
            const ticker = input.value.trim().toUpperCase();
            if(!ticker) return;

            try {
                const res = await fetch(`${API_BASE}/watchlist/1/add-stock?ticker=${ticker}`, { method: 'POST' });
                if(res.ok) {
                    alert(`${ticker} başarıyla takip listesine eklendi.`);
                    input.value = "";
                    // Ekrandaki listeyi güncellemek için geçici bir taktik veya mock render kullanılabilir
                    renderWatchlistRow(ticker);
                } else {
                    alert("Hisse eklenemedi (Zaten listede olabilir veya kod yanlış).");
                }
            } catch (err) { console.error(err); }
        }

        function renderWatchlistRow(ticker) {
            const container = document.getElementById("watchlistContainer");
            container.innerHTML += `
                <div id="wl-${ticker}" class="flex justify-between items-center bg-slate-800 p-3 rounded-lg border border-slate-700">
                    <span class="font-bold text-sky-400">${ticker}</span>
                    <button onclick="removeStockFromWatchlist('${ticker}')" class="text-xs text-red-400 hover:text-red-500 bg-red-500/10 px-2 py-1 rounded transition">Kaldır</button>
                </div>
            `;
        }

        async function removeStockFromWatchlist(ticker) {
            try {
                const res = await fetch(`${API_BASE}/watchlist/1/remove-stock?ticker=${ticker}`, { method: 'DELETE' });
                if(res.ok || res.status === 204) {
                    document.getElementById(`wl-${ticker}`).remove();
                }
            } catch (err) { console.error(err); }
        }

        // MODAL CONFIGURATIONS
        function openModal(type) {
            document.getElementById("transactionModal").classList.remove("hidden");
            document.getElementById("modalType").value = type;
            
            if(type === 'add') {
                document.getElementById("modalTitle").innerText = "🚀 Hisse Alım / Maliyet Ekle";
                document.getElementById("priceInputContainer").classList.remove("hidden");
            } else {
                document.getElementById("modalTitle").innerText = "📉 Hisse Satış Yap";
                document.getElementById("priceInputContainer").classList.add("hidden"); // Satışta maliyet girilmez
            }
        }

        function closeModal() {
            document.getElementById("transactionModal").classList.add("hidden");
            document.getElementById("modalForm").reset();
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const type = document.getElementById("modalType").value;
            const ticker = document.getElementById("formTicker").value.trim().toUpperCase();
            const quantity = parseInt(document.getElementById("formQuantity").value);
            const price = parseFloat(document.getElementById("formPrice").value);

            try {
                if (type === 'add') {
                    // ALIM API İSTEĞİ (POST RAW JSON)
                    const res = await fetch(`${API_BASE}/portfolio/add`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: USER_ID, ticker, quantity, price })
                    });
                    if(!res.ok) throw new Error("İşlem başarısız.");
                } else {
                    // SATIŞ API İSTEĞİ (POST QUERY PARAM)
                    const res = await fetch(`${API_BASE}/portfolio/sell?userId=${USER_ID}&ticker=${ticker}&quantity=${quantity}`, {
                        method: 'POST'
                    });
                    if(!res.ok) {
                        const errMsg = await res.text();
                        alert("Hata: " + (errMsg || "Yetersiz lot sayısı."));
                        return;
                    }
                }
                closeModal();
                refreshData(); // Her şey bitince ekranı tazelemeyi unutma!
            } catch (err) {
                alert("İşlem gerçekleştirilemedi: " + err.message);
            }
        }
    </script>
</body>
</html>
